version: 0.0
os: linux

files:
  - source: analytics/
    destination: /var/www/analytics

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 300

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 600

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
