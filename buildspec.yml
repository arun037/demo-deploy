version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - cd analytics/frontend
      - npm ci

  build:
    commands:
      - echo Using API URL=$VITE_API_BASE_URL
      - cd analytics/frontend
      - npm run build

  post_build:
    commands:
      - echo Build completed
      - ls -la analytics/frontend/dist

artifacts:
  files:
    - analytics/frontend/dist/**/*
    - analytics/backend/**/*
    - analytics/requirements.txt
    - appspec.yml
    - scripts/**/*
