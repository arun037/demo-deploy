version: 0.2

env:
  variables:
    FRONTEND_DIR: analytics/frontend

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing frontend dependencies
      - cd $FRONTEND_DIR
      - npm ci

  build:
    commands:
      - echo Building React app
      - cd $CODEBUILD_SRC_DIR/$FRONTEND_DIR
      - echo API URL=$VITE_API_BASE_URL
      - npm run build

  post_build:
    commands:
      - echo Verifying build output
      - ls -la $CODEBUILD_SRC_DIR/$FRONTEND_DIR/dist

artifacts:
  files:
    - analytics/frontend/dist/**/*
    - analytics/backend/**/*
    - analytics/requirements.txt
    - appspec.yml
    - scripts/**/*
