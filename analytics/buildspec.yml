version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing frontend dependencies..."
      - cd analytics/frontend
      - npm ci

  build:
    commands:
      - echo "Building React app..."
      - npm run build

  post_build:
    commands:
      - echo "Verifying build output..."
      - ls -la analytics/frontend/dist

artifacts:
  files:
    - analytics/frontend/dist/**/*
    - analytics/backend/**/*
    - analytics/requirements.txt
    - appspec.yml
    - scripts/**/*
